<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in / KgaboTwitter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <i class="bi bi-twitter"></i>
      <h1>Sign in to KgaboTwitter</h1>

      <form action="index.html">
        <input type="text" placeholder="Phone, email or username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="tweet-btn">Log in</button>
      </form>

      <div class="login-links">
        <a href="#">Forgot password?</a> &middot;
        <a href="#">Sign up for KgaboTwitter</a>
      </div>
      <div class="login-links">
        <a href="index.html">&larr; back to timeline</a>
      </div>
    </div>
  </div>

</body>
</html>
